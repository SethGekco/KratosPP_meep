name: Build KratosPP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add ATL to Visual Studio
        shell: pwsh
        run: |
          $installer = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
          & $installer modify --installPath "C:\Program Files\Microsoft Visual Studio\18\Enterprise" `
            --add Microsoft.VisualStudio.Component.VC.ATL `
            --quiet --norestart --force
          Start-Sleep -Seconds 30

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild Kratos.sln /p:Configuration=Release /p:Platform=x86

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kratos
          path: Release/Kratos.dll
